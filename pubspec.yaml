name: novel_reader_app
description: "NovelHub — multi-site web novel reader and research container."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Provides the WebView widget backed by the system webview (Android/iOS/macOS).
  webview_flutter: ^4.14.1

  # Key-value persistence for storing the site list across app restarts.
  shared_preferences: ^2.3.0

  # Simple ChangeNotifier-based state management (beginner-friendly).
  provider: ^6.1.2
  webview_refresher: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
